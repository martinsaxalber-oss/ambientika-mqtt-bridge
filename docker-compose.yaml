version: "3.8"
services:
  ambientika-bridge:
    image: ambientika-mqtt-bridge
    build: .
    restart: unless-stopped
    volumes:
      - ./config.yaml:/config/config.yaml:ro
    environment:
      - AMBIENTIKA_USER=${AMBIENTIKA_USER:-}
      - AMBIENTIKA_PASS=${AMBIENTIKA_PASS:-}
      - MQTT_HOST=${MQTT_HOST:-mosquitto}
      - MQTT_PORT=${MQTT_PORT:-1883}
    depends_on:
      - mosquitto

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

volumes:
  mosquitto_data:
  mosquitto_log:
