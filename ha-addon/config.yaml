name: "Ambientika MQTT Bridge"
description: "MQTT bridge for Ambientika ventilation units. Connects the Ambientika Cloud API to your local MQTT broker with Home Assistant Auto-Discovery support."
version: "1.0.0"
slug: "ambientika_mqtt_bridge"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
homeassistant_api: false
hassio_api: false
map:
  - config:rw
options:
  ambientika_username: ""
  ambientika_password: ""
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_topic_prefix: "ambientika"
  poll_interval: 30
  log_level: "INFO"
schema:
  ambientika_username: str
  ambientika_password: str
  mqtt_host: str
  mqtt_port: int(1,65535)
  mqtt_username: str?
  mqtt_password: str?
  mqtt_topic_prefix: str
  poll_interval: int(10,300)
  log_level: list(DEBUG|INFO|WARNING|ERROR)
panel_icon: mdi:air-filter
panel_title: Ambientika
