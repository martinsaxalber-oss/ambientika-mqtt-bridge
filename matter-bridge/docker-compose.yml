version: "3.8"

# Ambientika Matter Bridge - Docker Compose Stack
# Starts three services:
#   1. mosquitto  - MQTT broker (receives data from Ambientika MQTT bridge)
#   2. matter-server - python-matter-server (manages Matter commissioning)
#   3. ambientika-matter-bridge - this bridge
#
# Usage:
#   docker compose up -d
#   docker compose logs -f ambientika-matter-bridge

services:

  # ---------------------------------------------------------------------------
  # MQTT Broker
  # ---------------------------------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: ambientika-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - ambientika-net

  # ---------------------------------------------------------------------------
  # python-matter-server (Home Assistant Labs)
  # Manages Matter commissioning and controller
  # ---------------------------------------------------------------------------
  matter-server:
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    container_name: ambientika-matter-server
    restart: unless-stopped
    # Required for Matter BLE commissioning (optional, can use TCP)
    # network_mode: host
    ports:
      - "5580:5580"
    volumes:
      - matter-server-data:/data
    environment:
      - MATTER_SERVER_PORT=5580
    networks:
      - ambientika-net

  # ---------------------------------------------------------------------------
  # Ambientika Matter Bridge
  # ---------------------------------------------------------------------------
  ambientika-matter-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ambientika-matter-bridge
    restart: unless-stopped
    depends_on:
      - mosquitto
      - matter-server
    environment:
      # MQTT settings - point to your Ambientika MQTT bridge
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
      - MQTT_PREFIX=${MQTT_PREFIX:-ambientika}
      # Matter server
      - MATTER_SERVER_HOST=matter-server
      - MATTER_SERVER_PORT=5580
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - ambientika-net

networks:
  ambientika-net:
    driver: bridge

volumes:
  matter-server-data:
